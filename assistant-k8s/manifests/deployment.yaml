apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              chown 1000:1000 /home/node/.openclaw
              cp /config/config.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
          # 这个 initContainer 故意不设 runAsUser(用镜像默认的 root),因为 PVC 卷首次挂载时
          # 目录属主是 root(fsGroup 只改组,不改属主),需要 root 权限执行一次 chown 才能修正,
          # 后面 openclaw 自己在这个目录下创建的文件/子目录都是它自己(node 用户)写的,不受影响。
          # 主容器(实际跑 gateway 逻辑的那个)依然是 runAsNonRoot+只读根文件系统,不受此影响。
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: gateway-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
          # 容器内的 /home/node/.openclaw 这个路径不能改名——OpenClaw 运行时的
          # 插件状态数据库等内部子系统是硬编码这个路径的,不受 OPENCLAW_CONFIG_DIR
          # 影响,改了会导致 "mkdir .../state: ENOENT" 崩溃(实测踩过这个坑)。
          # K8s 层面的资源名字(卷名 gateway-home、PVC 名等)不受影响,可以放心保留 gateway 命名。
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: SERVERCHAN_SENDKEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: SERVERCHAN_SENDKEY
                  optional: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: gateway-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: gateway-home
          persistentVolumeClaim:
            claimName: gateway-home-pvc
        - name: config
          configMap:
            name: gateway-config
        - name: tmp-volume
          emptyDir: {}
