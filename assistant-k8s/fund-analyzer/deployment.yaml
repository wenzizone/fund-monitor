apiVersion: apps/v1
kind: Deployment
metadata:
  name: fund-analyzer
  labels:
    app: fund-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fund-analyzer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fund-analyzer
    spec:
      containers:
        - name: fund-analyzer
          image: python:3.12-slim
          command:
            - sh
            - -c
            - "pip install --no-cache-dir --disable-pip-version-check akshare && exec python server.py"
          workingDir: /app
          env:
            - name: PORT
              value: "8080"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: scripts
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # 每次启动都要 pip install akshare(没有自建镜像),给足够长的启动预算,
          # 起来之后正常的存活/就绪探针周期可以短一些。
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: scripts
          configMap:
            name: fund-analyzer-scripts
